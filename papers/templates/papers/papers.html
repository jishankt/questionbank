{% extends 'papers/base.html' %}

{% block extra_css %}
<style>

/* Page Heading */
.page-heading{
    text-align:center;
    font-weight:600;
    margin-bottom:25px;
}

/* Paper Card */
.paper-card{
    padding:25px 20px;
    text-align:center;
    border-radius:18px;
    background: rgba(255,255,255,0.06);
    backdrop-filter: blur(14px);
    border:1px solid rgba(255,255,255,0.12);
    transition:0.35s;
    color:white;
    height:100%;
}

/* Glow Hover */
.paper-card:hover{
    transform: translateY(-6px);
    box-shadow:0 0 28px rgba(91,140,255,0.4);
}

/* Title */
.paper-title{
    font-weight:600;
    font-size:18px;
}

/* Year Badge */
.year-badge{
    display:inline-block;
    margin-top:8px;
    padding:5px 12px;
    border-radius:20px;
    background:linear-gradient(45deg,#5b8cff,#7b2ff7);
    font-size:13px;
}

/* Buttons */
.paper-btn{
    border-radius:30px;
    padding:9px 18px;
    font-size:14px;
    width:100%;
}

/* Download Button Style */
.btn-download{
    background:linear-gradient(45deg,#00c9a7,#00e4ff);
    border:none;
    color:white;
}

/* Empty Message */
.empty-msg{
    text-align:center;
    margin-top:40px;
    opacity:0.8;
}

/* Mobile Optimization */
@media(max-width:768px){
    .paper-card{
        padding:28px 15px;
    }
}

</style>
{% endblock %}

{% block content %}

<h3 class="page-heading">📄 {{ subject.name }} Papers</h3>

<div class="row g-4">

{% for paper in papers %}
<div class="col-12 col-sm-6 col-md-4">

    <div class="paper-card">

        <div class="paper-title">
            {{ paper.title }}
        </div>

        <div class="year-badge">
            {{ paper.year }}
        </div>

        <div class="mt-4">

            <a href="{{ paper.pdf.url }}" target="_blank"
               class="btn btn-primary paper-btn">
               👁 View PDF
            </a>

            <a href="{{ paper.pdf.url }}" download
               class="btn btn-download paper-btn mt-2">
               ⬇ Download
            </a>

        </div>

    </div>

</div>
{% empty %}

<div class="empty-msg">
    <h5>No papers uploaded yet 📭</h5>
    <p>Please check again later.</p>
</div>

{% endfor %}
</div>

{% endblock %}
